<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebRTC Call</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
  h1 { text-align: center; padding: 20px; font-size: 1.1rem; font-weight: 500; color: #aaa; letter-spacing: 0.05em; }
  .videos { display: flex; gap: 12px; padding: 0 16px; justify-content: center; flex-wrap: wrap; }
  .video-wrap { position: relative; background: #222; border-radius: 8px; overflow: hidden; width: 320px; height: 240px; flex-shrink: 0; }
  .video-wrap label { position: absolute; top: 8px; left: 10px; font-size: 0.7rem; color: #aaa; z-index: 1; text-transform: uppercase; letter-spacing: 0.08em; }
  .video-wrap .placeholder { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #444; font-size: 0.8rem; }
  video { width: 100%; height: 100%; object-fit: cover; display: block; }
  #localVideo { transform: scaleX(-1); }
  .cam-controls { display: flex; justify-content: center; gap: 8px; padding: 12px 16px 0; flex-wrap: wrap; }
  .signaling { max-width: 680px; margin: 20px auto; padding: 0 16px; width: 100%; display: flex; flex-direction: column; gap: 12px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
  textarea { flex: 1; min-width: 200px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; color: #eee; font-family: monospace; font-size: 0.7rem; padding: 8px; resize: vertical; height: 70px; outline: none; }
  textarea:focus { border-color: #555; }
  textarea::placeholder { color: #444; }
  button { background: #2a2a2a; border: 1px solid #444; border-radius: 6px; color: #eee; font-size: 0.8rem; padding: 8px 16px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  button:hover { background: #333; }
  button:disabled { opacity: 0.35; cursor: default; }
  button.primary { background: #1d4ed8; border-color: #2563eb; }
  button.primary:hover { background: #2563eb; }
  button.danger { background: #7f1d1d; border-color: #991b1b; }
  button.danger:hover { background: #991b1b; }
  button.muted { background: #3d1515; border-color: #7f1d1d; color: #f87171; }
  .status { text-align: center; font-size: 0.75rem; color: #666; padding: 4px 0; }
  .status.connected { color: #4ade80; }
  .status.error { color: #f87171; }
  hr { border: none; border-top: 1px solid #222; margin: 4px 0; }
  .step-label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>

<h1>WebRTC Video Call</h1>

<div class="videos">
  <div class="video-wrap">
    <label>You</label>
    <div class="placeholder" id="localPlaceholder">Camera off</div>
    <video id="localVideo" autoplay playsinline muted style="display:none"></video>
  </div>
  <div class="video-wrap">
    <label>Remote</label>
    <div class="placeholder" id="remotePlaceholder">Waiting...</div>
    <video id="remoteVideo" autoplay playsinline style="display:none"></video>
  </div>
</div>

<div class="cam-controls">
  <button onclick="toggleCamera()" id="btnCam">📷 Camera On</button>
  <button onclick="toggleMic()" id="btnMic" disabled>🎤 Mic On</button>
  <button onclick="endCall()" class="danger">✕ End</button>
</div>

<div class="signaling">
  <div class="status" id="status">Not connected</div>
  <hr>

  <div class="step-label">Step 1 — Create offer (caller)</div>
  <div class="row">
    <button class="primary" onclick="createOffer()">Create Offer</button>
    <textarea id="offerOut" readonly placeholder="Your offer SDP will appear here..."></textarea>
    <button onclick="copy('offerOut')" id="btnCopyOffer" disabled>Copy</button>
  </div>

  <div class="step-label">Step 2 — Paste offer &amp; get answer (joiner)</div>
  <div class="row">
    <textarea id="offerIn" placeholder="Paste caller's offer SDP here..."></textarea>
    <button class="primary" onclick="createAnswer()">Create Answer</button>
    <textarea id="answerOut" readonly placeholder="Your answer SDP will appear here..."></textarea>
    <button onclick="copy('answerOut')" id="btnCopyAnswer" disabled>Copy</button>
  </div>

  <div class="step-label">Step 3 — Paste answer (caller)</div>
  <div class="row">
    <textarea id="answerIn" placeholder="Paste joiner's answer SDP here..."></textarea>
    <button class="primary" onclick="applyAnswer()">Apply Answer</button>
  </div>
</div>

<script>
const cfg = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
let pc = null, localStream = null, camOn = false, micOn = false;

function setStatus(msg, cls='') {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + cls;
}

async function toggleCamera() {
  const btn = document.getElementById('btnCam');
  if (!camOn) {
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      const v = document.getElementById('localVideo');
      v.srcObject = localStream; v.style.display = 'block';
      document.getElementById('localPlaceholder').style.display = 'none';
      camOn = true; micOn = true;
      btn.textContent = '📷 Camera Off'; btn.classList.add('muted');
      document.getElementById('btnMic').disabled = false;
      if (pc) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
    } catch(e) { setStatus('Camera error: ' + e.message, 'error'); }
  } else {
    localStream.getTracks().forEach(t => t.stop()); localStream = null;
    const v = document.getElementById('localVideo');
    v.srcObject = null; v.style.display = 'none';
    document.getElementById('localPlaceholder').style.display = 'flex';
    camOn = false; micOn = false;
    btn.textContent = '📷 Camera On'; btn.classList.remove('muted');
    const bm = document.getElementById('btnMic');
    bm.disabled = true; bm.textContent = '🎤 Mic On'; bm.classList.remove('muted');
  }
}

function toggleMic() {
  if (!localStream) return;
  micOn = !micOn;
  localStream.getAudioTracks().forEach(t => t.enabled = micOn);
  const btn = document.getElementById('btnMic');
  btn.textContent = micOn ? '🎤 Mic On' : '🔇 Mic Off';
  btn.classList.toggle('muted', !micOn);
}

function initPc() {
  if (pc) pc.close();
  pc = new RTCPeerConnection(cfg);
  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
  pc.ontrack = e => {
    const v = document.getElementById('remoteVideo');
    v.srcObject = e.streams[0]; v.style.display = 'block';
    document.getElementById('remotePlaceholder').style.display = 'none';
  };
  pc.onconnectionstatechange = () => {
    const s = pc.connectionState;
    const map = { connected: ['Connected', 'connected'], disconnected: ['Disconnected', 'error'], failed: ['Failed', 'error'] };
    if (map[s]) setStatus(...map[s]);
  };
}

function gatherIce() {
  return new Promise(r => {
    if (pc.iceGatheringState === 'complete') return r();
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') r(); };
    setTimeout(r, 5000);
  });
}

async function createOffer() {
  initPc(); setStatus('Creating offer...');
  const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
  await pc.setLocalDescription(offer); await gatherIce();
  document.getElementById('offerOut').value = JSON.stringify(pc.localDescription);
  document.getElementById('btnCopyOffer').disabled = false;
  setStatus('Share your offer with the joiner.');
}

async function createAnswer() {
  const raw = document.getElementById('offerIn').value.trim();
  if (!raw) return alert("Paste the caller's offer first.");
  initPc(); setStatus('Creating answer...');
  await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(raw)));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer); await gatherIce();
  document.getElementById('answerOut').value = JSON.stringify(pc.localDescription);
  document.getElementById('btnCopyAnswer').disabled = false;
  setStatus('Share your answer with the caller.');
}

async function applyAnswer() {
  const raw = document.getElementById('answerIn').value.trim();
  if (!raw) return alert("Paste the joiner's answer first.");
  if (!pc) return alert('Create an offer first.');
  await pc.setRemoteDescription(new RTCSessionDescription(JSON.parse(raw)));
  setStatus('Connecting...');
}

function copy(id) {
  navigator.clipboard.writeText(document.getElementById(id).value).then(() => setStatus('Copied!'));
}

function endCall() {
  if (pc) { pc.close(); pc = null; }
  if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
  ['localVideo','remoteVideo'].forEach(id => { const v = document.getElementById(id); v.srcObject = null; v.style.display = 'none'; });
  document.getElementById('localPlaceholder').style.display = 'flex';
  document.getElementById('remotePlaceholder').style.display = 'flex';
  camOn = false; micOn = false;
  document.getElementById('btnCam').textContent = '📷 Camera On';
  document.getElementById('btnCam').classList.remove('muted');
  const bm = document.getElementById('btnMic'); bm.disabled = true; bm.textContent = '🎤 Mic On'; bm.classList.remove('muted');
  setStatus('Call ended.');
}
</script>

</body>
</html>

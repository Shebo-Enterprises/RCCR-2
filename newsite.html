<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCCR | Rabbinical Council</title>
    
    <!-- Materialize CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root { --primary: #1a237e; }
        body { background: #f5f5f5; font-family: 'Verdana', sans-serif; }
        nav { background: var(--primary); }
        .error-overlay { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 4px; margin: 10px 0; display: none; }
        .card-image img { max-height: 200px; object-fit: cover; }
        /* If image is missing, don't show the container */
        .empty-img { display: none !important; }
        #debug-log { background: #222; color: #0f0; padding: 15px; font-family: monospace; font-size: 12px; margin-top: 50px; border-top: 5px solid #444; }
    </style>

    <!-- Firebase SDKs (v8) -->
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-firestore.js"></script>
</head>
<body>

    <nav>
        <div class="nav-wrapper container">
            <a href="#" class="brand-logo">RCCR</a>
            <ul id="nav-mobile" class="right hide-on-med-and-down">
                <!-- Links will inject here -->
            </ul>
        </div>
    </nav>

    <div class="container" style="margin-top: 30px;">
        <div class="row">
            <!-- Sidebar -->
            <div class="col s12 m3">
                <div id="sidebar-error" class="error-overlay"></div>
                <ul class="collection with-header" id="sidebar-links">
                    <li class="collection-header"><h5>Links</h5></li>
                    <li class="collection-item">Loading links...</li>
                </ul>
            </div>

            <!-- Main Content -->
            <div class="col s12 m9">
                <div class="card-panel">
                    <h4>Rabbinical Council of The Charles River</h4>
                    <p>Serving the community with halachic expertise.</p>
                </div>

                <div id="features-error" class="error-overlay"></div>
                <div id="feature-box-container" class="row">
                    <!-- Features will inject here -->
                </div>

                <div id="news-error" class="error-overlay"></div>
                <div class="section">
                    <h5>Latest News</h5>
                    <div id="news-list-container">
                        <!-- News will inject here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- System Debugger -->
    <div id="debug-log">
        <b>SYSTEM STATUS:</b> <span id="status-text">Initializing...</span>
        <div id="log-output"></div>
    </div>

    <script>
        // ERROR LOGGER
        function logMsg(msg, isError = false) {
            const out = document.getElementById('log-output');
            const status = document.getElementById('status-text');
            const time = new Date().toLocaleTimeString();
            out.innerHTML += `<div style="color:${isError ? '#ff5555' : '#00ff00'}">[${time}] ${msg}</div>`;
            status.innerText = isError ? "ERROR DETECTED" : "RUNNING";
        }

        function showUIError(elementId, message) {
            const el = document.getElementById(elementId);
            if(el) {
                el.innerText = "⚠️ " + message;
                el.style.display = "block";
            }
            logMsg(message, true);
        }

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDa-q7h7VTuHxffftGK44NhKKfLt0w8qjM",
            authDomain: "rccr-main.firebaseapp.com",
            projectId: "rccr-main",
            storageBucket: "rccr-main.firebasestorage.app",
            messagingSenderId: "221328154434",
            appId: "1:221328154434:web:a6000a45f5d4ba964532db",
            measurementId: "G-97BBMTGDR0"
        };

        try {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                logMsg("Firebase Initialized successfully.");
            }
        } catch (e) {
            logMsg("Initialization Failed: " + e.message, true);
        }

        const db = firebase.firestore();

        // LOAD LINKS
        function loadLinks() {
            db.collection('links').orderBy('order').get().then(qs => {
                const sidebar = document.getElementById('sidebar-links');
                const nav = document.getElementById('nav-mobile');
                sidebar.innerHTML = '<li class="collection-header"><h5>Links</h5></li>';
                
                if(qs.empty) logMsg("Links collection is empty.");

                qs.forEach(doc => {
                    const l = doc.data();
                    const item = `<li class="collection-item"><a href="${l.url}">${l.text}</a></li>`;
                    sidebar.innerHTML += item;
                    nav.innerHTML += `<li><a href="${l.url}">${l.text}</a></li>`;
                });
                logMsg("Links loaded.");
            }).catch(err => {
                showUIError('sidebar-error', "Links Error: " + err.message);
            });
        }

        // LOAD FEATURES
        function loadFeatures() {
            db.collection('featureBoxes').get().then(qs => {
                const container = document.getElementById('feature-box-container');
                container.innerHTML = '';
                
                qs.forEach(doc => {
                    const fb = doc.data();
                    const col = document.createElement('div');
                    col.className = 'col s12 m6';
                    col.innerHTML = `
                        <div class="card" style="background:${fb.backgroundColor || '#fff'}">
                            ${fb.imageUrl ? `<div class="card-image"><img src="${fb.imageUrl}" onerror="this.parentElement.style.display='none'"></div>` : ''}
                            <div class="card-content">
                                <span class="card-title">${fb.title || ''}</span>
                                <p>${fb.text || ''}</p>
                            </div>
                            ${fb.linkText ? `<div class="card-action"><a href="${fb.linkUrl}">${fb.linkText}</a></div>` : ''}
                        </div>`;
                    container.appendChild(col);
                });
                logMsg("Features loaded.");
            }).catch(err => {
                showUIError('features-error', "Features Error: " + err.message);
            });
        }

        // LOAD NEWS
        function loadNews() {
            db.collection('news').orderBy('timestamp', 'desc').limit(5).get().then(qs => {
                const container = document.getElementById('news-list-container');
                container.innerHTML = '';
                
                qs.forEach(doc => {
                    const n = doc.data();
                    container.innerHTML += `
                        <div class="card-panel grey lighten-4 z-depth-0">
                            <div class="row valign-wrapper" style="margin:0">
                                ${n.imageUrl ? `<div class="col s2"><img src="${n.imageUrl}" class="responsive-img" onerror="this.style.display='none'"></div>` : ''}
                                <div class="col s10">
                                    <span class="black-text"><b>${n.title}</b><br>${n.snippet}</span>
                                </div>
                            </div>
                        </div>`;
                });
                logMsg("News loaded.");
            }).catch(err => {
                showUIError('news-error', "News Error: " + err.message);
            });
        }

        // RUN
        window.onload = () => {
            loadLinks();
            loadFeatures();
            loadNews();
        };
    </script>
</body>
</html>

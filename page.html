<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCCR | Rabbinical Council</title>
    <link rel="shortcut icon" href="images/favicon.ico" type="image/x-icon">
    
    <!-- Materialize CSS & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        :root { --rccr-blue: #1a237e; }
        body { display: flex; min-height: 100vh; flex-direction: column; background-color: #fafafa; font-family: 'Verdana', sans-serif; }
        main { flex: 1 0 auto; margin-top: 30px; }
        
        /* Navigation Styles */
        nav { background-color: var(--rccr-blue); }
        .brand-logo { display: flex; align-items: center; font-size: 1.2rem !important; }
        .brand-logo img { height: 40px; margin-right: 15px; }
        
        /* Content Styles */
        #page-title { color: var(--rccr-blue); font-weight: bold; margin-top: 0; border-bottom: 2px solid #eeeeee; padding-bottom: 10px; }
        #page-content { line-height: 1.6; font-size: 16px; }
        
        /* Sidebar Styling */
        .collection .collection-item a { color: var(--rccr-blue); display: block; width: 100%; }
        .collection .collection-item:hover { background-color: #f5f5f5; }
        
        /* Error/Status UI */
        .status-box { padding: 10px; border-radius: 4px; margin-bottom: 20px; display: none; }
        .error-msg { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; display: block; }
        
        footer { padding: 20px 0; border-top: 1px solid #e0e0e0; margin-top: 50px; background: #fff; }
    </style>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.1/firebase-firestore.js"></script>
</head>
<body>

    <!-- Header Navigation -->
    <div class="navbar-fixed">
        <nav>
            <div class="nav-wrapper container">
                <a href="index.html" class="brand-logo">
                    <img src="Rabbinical Council (1) (1).png" alt="Logo" onerror="this.style.display='none'">
                    <span>RCCR</span>
                </a>
                <ul class="right hide-on-med-and-down" id="nav-links">
                    <!-- Nav items will inject here -->
                </ul>
            </div>
        </nav>
    </div>

    <main class="container">
        <div class="row">
            <!-- Sidebar Navigation -->
            <div class="col s12 m3">
                <ul class="collection with-header" id="sidebar-links">
                    <li class="collection-header"><h6>Navigation</h6></li>
                    <!-- Links from Firebase -->
                </ul>
            </div>

            <!-- Main Page Content -->
            <div class="col s12 m9">
                <div id="error-display" class="status-box error-msg"></div>
                
                <div class="card-panel z-depth-1">
                    <h1 id="page-title" style="font-size: 2.2rem;">Loading...</h1>
                    <div id="page-content">
                        <div class="progress"><div class="indeterminate"></div></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container center-align grey-text text-darken-1" style="font-size: 0.8rem;">
            Copyright, RCCR, <span id="current-year"></span><br>
            Powered By: Shebo Enterprises | <a href="admin.html" class="grey-text">Admin Log-in</a>
        </div>
    </footer>

    <script>
        document.getElementById('current-year').textContent = new Date().getFullYear();

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDa-q7h7VTuHxffftGK44NhKKfLt0w8qjM",
            authDomain: "rccr-main.firebaseapp.com",
            projectId: "rccr-main",
            storageBucket: "rccr-main.firebasestorage.app",
            messagingSenderId: "221328154434",
            appId: "1:221328154434:web:a6000a45f5d4ba964532db",
            measurementId: "G-97BBMTGDR0"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function getParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name) || '';
        }

        function showUIError(msg) {
            const errBox = document.getElementById('error-display');
            errBox.textContent = "⚠️ " + msg;
            errBox.style.display = "block";
        }

        // Render Navigation Links
        function renderLinks() {
            const sidebar = document.getElementById('sidebar-links');
            const topNav = document.getElementById('nav-links');
            
            db.collection('links').orderBy('order').get().then(qs => {
                // Clear existing "Loading" text
                const header = sidebar.querySelector('.collection-header');
                sidebar.innerHTML = '';
                sidebar.appendChild(header);

                if (qs.empty) {
                    sidebar.innerHTML += '<li class="collection-item"><a href="index.html">Home</a></li>';
                    return;
                }

                let count = 0;
                qs.forEach(doc => {
                    const l = doc.data();
                    const li = document.createElement('li');
                    li.className = 'collection-item';
                    const a = document.createElement('a');
                    a.textContent = l.text;
                    a.href = l.url;
                    if (l.targetBlank) { a.target = '_blank'; a.rel = 'noopener'; }
                    
                    li.appendChild(a);
                    sidebar.appendChild(li);

                    // Add first 4 links to top nav for convenience
                    if(count < 4) {
                        const navLi = document.createElement('li');
                        navLi.innerHTML = `<a href="${l.url}">${l.text}</a>`;
                        topNav.appendChild(navLi);
                    }
                    count++;
                });
            }).catch(err => {
                showUIError('Error loading links: ' + err.message);
            });
        }

        // Render Dynamic Page Content
        function renderPage() {
            const slug = getParam('slug');
            const titleEl = document.getElementById('page-title');
            const contentEl = document.getElementById('page-content');

            if (!slug) { 
                titleEl.textContent = 'Page Not Found'; 
                contentEl.innerHTML = '<p>No page identifier provided. Please return to the home page.</p>';
                return; 
            }

            db.collection('pages').where('slug', '==', slug).limit(1).get().then(qs => {
                if (qs.empty) { 
                    titleEl.textContent = 'Page Not Found'; 
                    contentEl.innerHTML = '<p>The requested page could not be located in our records.</p>';
                    return; 
                }
                const page = qs.docs[0].data();
                titleEl.textContent = page.title || slug;
                contentEl.innerHTML = page.contentHtml || '<p>No content available.</p>';
            }).catch(err => {
                showUIError('Error loading page content: ' + err.message);
                titleEl.textContent = 'Error';
            });
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderLinks();
            renderPage();
            // Initialize Materialize Components
            M.AutoInit();
        });
    </script>

    <!-- Official Banner Injection Script -->
    <script>
        (function() {
            // [Keep the Banner Script exactly as you had it]
            const css = `.rccr-banner-root { background-color: #f0f0f0; border-bottom: 1px solid #d1d5db; font-family: sans-serif; color: #1b1b1b; width: 100%; box-sizing: border-box; } .rccr-max-w { max-width: 80rem; margin: 0 auto; padding: 0.5rem 1rem; } .rccr-header { display: flex; align-items: center; } .rccr-logo-group { display: flex; align-items: center; gap: 0.5rem; } .rccr-text-small { font-size: 11px; } .rccr-toggle-btn { margin-left: 0.75rem; font-size: 11px; color: #005ea2; text-decoration: underline; background: none; border: none; cursor: pointer; } .rccr-details { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; } .rccr-details.expanded { max-height: 500px; }`;
            const style = document.createElement('style'); style.textContent = css; document.head.appendChild(style);
            const banner = document.createElement('section'); banner.className = 'rccr-banner-root';
            banner.innerHTML = `<div class="rccr-max-w"><div class="rccr-header"><div class="rccr-logo-group"><p class="rccr-text-small">An official website of the <b>RCCR</b></p></div><button id="rccr-toggle-btn" class="rccr-toggle-btn">Here's how you know</button></div><div id="rccr-details" class="rccr-details"><p style="font-size:11px; padding:10px;">Official .rebchardle.org sites use HTTPS.</p></div></div>`;
            document.body.insertBefore(banner, document.body.firstChild);
            banner.querySelector('#rccr-toggle-btn').addEventListener('click', () => {
                banner.querySelector('#rccr-details').classList.toggle('expanded');
            });
        })();
    </script>
</body>
</html>
